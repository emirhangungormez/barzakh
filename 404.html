<!DOCTYPE html>

    <link rel="stylesheet" href="style.css">
    <style>
        .error-hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .huge-404 {
            font-size: clamp(100px, 25vw, 300px);
            font-weight: 800;
            line-height: 1;
            letter-spacing: -5px;
            color: rgba(255, 255, 255, 0.05);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            user-select: none;
        }

        .error-content {
            text-align: center;
        }

        .error-content h1 {
            font-size: 32px;
            margin-bottom: 20px;
        }

        .error-content p {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
        }

        .back-home-btn {
            display: inline-block;
            padding: 15px 40px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
        }

        .back-home-btn:hover {
            background: #fff;
            color: #000;
            border-color: #fff;
        }
    </style>
</head>
